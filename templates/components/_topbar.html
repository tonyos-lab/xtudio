<nav class="topbar d-flex align-items-center justify-content-between px-4">
    <div class="topbar-breadcrumb">
        {% if breadcrumbs %}
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    {% for crumb in breadcrumbs %}
                        {% if crumb.url %}
                            <li class="breadcrumb-item">
                                <a href="{{ crumb.url }}">{{ crumb.label }}</a>
                            </li>
                        {% else %}
                            <li class="breadcrumb-item active" aria-current="page">{{ crumb.label }}</li>
                        {% endif %}
                    {% endfor %}
                </ol>
            </nav>
        {% else %}
            <span class="text-muted">{{ page_title|default:"xtudio" }}</span>
        {% endif %}
    </div>
    <div class="topbar-actions d-flex align-items-center gap-3">
        <div class="position-relative">
            <button class="btn btn-link p-0 text-muted" title="Notifications">
                <i class="bi bi-bell fs-5"></i>
                {% if unread_notification_count %}
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:0.6rem;">
                        {{ unread_notification_count }}
                    </span>
                {% endif %}
            </button>
        </div>
        <div class="dropdown">
            <button class="btn btn-link p-0 text-muted dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle fs-5"></i>
                <span class="ms-1 small">{{ user.username }}</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="{% url 'profile' %}"><i class="bi bi-person me-2"></i>Profile</a></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <a class="dropdown-item text-danger" href="#"
                       onclick="event.preventDefault(); document.getElementById('topbar-logout-form').submit();">
                        <i class="bi bi-box-arrow-right me-2"></i>Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
    <form id="topbar-logout-form" method="post" action="{% url 'logout' %}" class="d-none">
        {% csrf_token %}
    </form>
</nav>
