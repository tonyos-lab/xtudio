{% extends "base/auth_base.html" %}
{% block title %}Reset Password — xtudio{% endblock %}
{% block auth_content %}
<h1 class="auth-title">Reset password</h1>
<p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

<form method="post" class="auth-form">
    {% csrf_token %}
    <div class="form-group">
        <label class="form-label" for="id_email">Email address</label>
        <input type="email" id="id_email" name="email" class="form-input"
               placeholder="you@example.com" autofocus required autocomplete="email">
    </div>
    <button type="submit" class="btn btn-primary btn-full">Send reset link</button>
</form>
<p class="auth-switch"><a href="{% url 'accounts-login' %}">← Back to sign in</a></p>
{% endblock %}
